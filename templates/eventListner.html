<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review System Practice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-200 p-10">

    <div class="max-w-2xl mx-auto">
        <h2 class="text-2xl font-bold mb-8 border-b border-gray-800 pb-4">User Reviews</h2>

        <div class="space-y-4 mb-10">
            <div class="bg-gray-900/50 p-6 rounded-2xl border border-gray-800 hover:border-gray-700 transition-all">
                <div class="flex justify-between items-start mb-3">
                    <h4 class="font-bold text-white text-lg">Pawan Maurya</h4>
                    <div class="text-yellow-400 text-sm">
                        <i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i><i class="fa-solid fa-star"></i>
                    </div>
                </div>
                <p class="text-gray-400 italic">"This is a great practice project!"</p>
            </div>
        </div>

        <div class="text-center">
            <button id="toggleReview" class="flex items-center gap-2 text-blue-400 hover:text-cyan-400 font-medium transition-all mx-auto group">
                <span class="p-2 bg-blue-500/10 rounded-full group-hover:bg-blue-500/20">
                    <i class="fa-solid fa-pen-to-square"></i>
                </span>
                Write a Review
            </button>
        </div>

        <div id="reviewFormContainer" class="hidden mt-6 p-6 bg-gray-900 border border-gray-700 rounded-[2rem] shadow-2xl transition-all duration-300 scale-95 opacity-0">
            <form class="space-y-5">
                <div class="flex flex-row-reverse justify-center items-center gap-1">
                    <input type="radio" id="s5" name="rating" class="peer hidden" /><label for="s5" class="cursor-pointer text-3xl text-gray-600 peer-checked:text-yellow-400 hover:text-yellow-300">★</label>
                    <input type="radio" id="s4" name="rating" class="peer hidden" /><label for="s4" class="cursor-pointer text-3xl text-gray-600 peer-checked:text-yellow-400 hover:text-yellow-300">★</label>
                    <input type="radio" id="s3" name="rating" class="peer hidden" /><label for="s3" class="cursor-pointer text-3xl text-gray-600 peer-checked:text-yellow-400 hover:text-yellow-300">★</label>
                    <input type="radio" id="s2" name="rating" class="peer hidden" /><label for="s2" class="cursor-pointer text-3xl text-gray-600 peer-checked:text-yellow-400 hover:text-yellow-300">★</label>
                    <input type="radio" id="s1" name="rating" class="peer hidden" /><label for="s1" class="cursor-pointer text-3xl text-gray-600 peer-checked:text-yellow-400 hover:text-yellow-300">★</label>
                </div>

                <textarea rows="3" class="w-full bg-gray-800 border border-gray-700 text-white rounded-2xl px-4 py-3 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Tell us what you think..."></textarea>

                <button type="button" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-2xl">Publish Review</button>
            </form>
        </div>
    </div>

    <script>
        const btn = document.getElementById('toggleReview');
        const formBox = document.getElementById('reviewFormContainer');

        // 1. OPEN/CLOSE Function
        function toggleForm() {
            if (formBox.classList.contains('hidden')) {
                formBox.classList.remove('hidden');
                setTimeout(() => {
                    formBox.classList.remove('scale-95', 'opacity-0');
                    formBox.classList.add('scale-100', 'opacity-100');
                }, 10);
            } else {
                formBox.classList.add('scale-95', 'opacity-0');
                setTimeout(() => formBox.classList.add('hidden'), 300);
            }
        }

        btn.addEventListener('click', (e) => {
            e.stopPropagation(); // Button click par bahar wala click trigger na ho
            toggleForm();
        });

        // 2. SMART CLICK LOGIC (e.target practice)
        document.addEventListener('click', function(e) {
            console.log("Clicked on:", e.target);

            // Agar Form khula hai AND click Form ke bahar hua AND click Button par bhi nahi hua
            if (!formBox.classList.contains('hidden') && 
                !formBox.contains(e.target) && 
                !btn.contains(e.target)) {
                
                console.log("👉 Outside click detected! Closing form...");
                toggleForm();
            }
        });
    </script>
