<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white p-10 flex flex-col items-center">

    <button id="toggleBtn" class="bg-blue-600 px-6 py-2 rounded-lg font-bold">
        Write a Review
    </button>

    <div id="formBox" class="hidden mt-5 w-80 bg-gray-800 p-6 rounded-xl border border-gray-700">
        <form method="POST" class="space-y-4">
            
            <div class="flex justify-center gap-2">
                <input type="radio" name="rating" id="r1" value="1" class="hidden peer/1" required>
                <label for="r1" class="cursor-pointer text-gray-500 hover:text-yellow-400 peer-checked/1:text-yellow-400 text-2xl"><i class="fa-solid fa-star"></i></label>
                
                <input type="radio" name="rating" id="r2" value="2" class="hidden peer/2">
                <label for="r2" class="cursor-pointer text-gray-500 hover:text-yellow-400 peer-checked/2:text-yellow-400 text-2xl"><i class="fa-solid fa-star"></i></label>
                
                <input type="radio" name="rating" id="r3" value="3" class="hidden peer/3">
                <label for="r3" class="cursor-pointer text-gray-500 hover:text-yellow-400 peer-checked/3:text-yellow-400 text-2xl"><i class="fa-solid fa-star"></i></label>

                <input type="radio" name="rating" id="r4" value="4" class="hidden peer/4">
                <label for="r4" class="cursor-pointer text-gray-500 hover:text-yellow-400 peer-checked/4:text-yellow-400 text-2xl"><i class="fa-solid fa-star"></i></label>

                <input type="radio" name="rating" id="r5" value="5" class="hidden peer/5">
                <label for="r5" class="cursor-pointer text-gray-500 hover:text-yellow-400 peer-checked/5:text-yellow-400 text-2xl"><i class="fa-solid fa-star"></i></label>
            </div>

            <textarea name="comment" class="w-full bg-gray-700 p-3 rounded-lg outline-none" placeholder="Kya lagta hai?"></textarea>
            
            <button type="submit" class="w-full bg-green-600 py-2 rounded-lg font-bold">Publish</button>
        </form>
    </div>

    <script>
        const btn = document.getElementById('toggleBtn');
        const box = document.getElementById('formBox');

        btn.onclick = () => {
            const isHidden = box.classList.toggle('hidden');
            btn.textContent = isHidden ? 'Write a Review' : 'Close';
        };
    </script>
</body>
</html>
