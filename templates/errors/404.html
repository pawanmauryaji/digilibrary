{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>404 - Page Not Found</title>
  {% tailwind_css %}
</head>

<body class="bg-gray-950 text-white flex items-center justify-center min-h-screen">

<div class="text-center px-6">

<h1 class="text-9xl font-extrabold text-red-500 drop-shadow-lg">404</h1>

<h2 class="text-3xl mt-4 font-semibold">Page Not Found</h2>

<p class="text-gray-400 mt-3 max-w-md mx-auto">
The page you are looking for might have been removed,
had its name changed, or is temporarily unavailable.
</p>

<div class="mt-8 flex justify-center gap-4">

<a href="/"
class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-xl shadow-lg transition">
Go Home
</a>


</div>

</div>

</body>
</html>
