{% extends 'base.html' %}
{% load static %}

{% block content %}

<section class="min-h-screen flex items-center justify-center bg-gray-900 px-4 sm:px-6 md:px-12 py-4">

  <div class="w-full max-w-md bg-gray-800 p-6 sm:p-8 md:p-10 rounded-3xl shadow-2xl">

    <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold text-center text-blue-400 mb-4">
      OTP Verification
    </h2>

    <p class="text-gray-400 text-center text-sm sm:text-base mb-6">
      OTP sent to
      <span class="text-cyan-400 font-semibold break-all">
        {{ email }}
      </span>
    </p>

    <form method="POST" class="space-y-6">
      {% csrf_token %}

      <label class="block text-gray-200 font-semibold text-center">
        Enter 6 Digit OTP
      </label>

      <!-- OTP BOXES -->

      <div class="flex justify-center gap-3">

        {% for i in "123456" %}

        <input
          type="text"
          maxlength="1"
          inputmode="numeric"
          pattern="[0-9]*"
          class="otp-box w-12 h-12 md:w-14 md:h-14 text-center text-xl rounded-xl bg-gray-700 text-white focus:ring-2 focus:ring-blue-400 outline-none"
        >

        {% endfor %}

      </div>

      <!-- Hidden OTP Field -->
      <input type="hidden" name="otp" id="otp_value">


      <!-- Messages -->

      {% if messages %}
        {% for message in messages %}

        <div class="
        {% if message.tags == 'success' %}
        text-green-500
        {% else %}
        text-red-500
        {% endif %}
        text-center text-sm sm:text-base">

          {{ message }}

        </div>

        {% endfor %}
      {% endif %}

      <!-- Submit -->

      <button
        type="submit"
        class="w-full bg-gradient-to-r from-blue-500 to-cyan-500 text-white font-semibold py-3 rounded-2xl shadow-lg hover:scale-105 transition">

        Verify OTP

      </button>

    </form>


    <!-- RESEND -->

    <div class="text-center mt-6">

      <p id="timer" class="text-gray-400 text-sm">
        Resend OTP in <span id="countdown">30</span> sec
      </p>

      <a href="{% url 'resend_otp' %}"
         id="resendBtn"
         class="hidden text-blue-400 font-semibold hover:text-cyan-400 transition">

         Resend OTP

      </a>

    </div>

  </div>

</section>


<script>

/* OTP INPUT LOGIC */

const inputs = document.querySelectorAll(".otp-box");
const otpField = document.getElementById("otp_value");

inputs.forEach((input, index) => {

  input.addEventListener("input", () => {

    if (input.value.length === 1 && index < inputs.length - 1) {
      inputs[index + 1].focus();
    }

    updateOTP();

  });

  input.addEventListener("keydown", (e) => {

    if (e.key === "Backspace" && input.value === "" && index > 0) {
      inputs[index - 1].focus();
    }

    if (e.key === "ArrowLeft" && index > 0) {
      e.preventDefault();
      inputs[index - 1].focus();
    }

    if (e.key === "ArrowRight" && index < inputs.length - 1) {
      inputs[index + 1].focus();
    }

  });

});


function updateOTP() {

  let otp = "";

  inputs.forEach(input => {
    otp += input.value;
  });

  otpField.value = otp;

}


/* PASTE SUPPORT */

inputs[0].addEventListener("paste", (e) => {

  const pasteData = e.clipboardData.getData("text").slice(0,6);

  pasteData.split("").forEach((num,i)=>{
    if(inputs[i]){
      inputs[i].value = num;
    }
  });

  updateOTP();

});


/* TIMER */

const countdown = document.getElementById("countdown");
const resendBtn = document.getElementById("resendBtn");
const timerText = document.getElementById("timer");

let time = 30;

const timer = setInterval(()=>{

  time--;
  countdown.innerText = time;

  if(time <= 0){

    clearInterval(timer);
    timerText.style.display = "none";
    resendBtn.classList.remove("hidden");

  }

},1000);

</script>

{% endblock %}
