{% extends 'base.html' %}
{% load static %}
{% block content %}
  <section class="min-h-screen flex items-center justify-center bg-gray-900 px-4 sm:px-6 md:px-12 py-1 sm:py-4 md:py-8">
    <div class="w-full max-w-sm sm:max-w-md md:max-w-lg bg-gray-800 p-4 sm:p-8 md:p-10 rounded-3xl shadow-2xl">
      <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold text-center text-blue-400 mb-4">OTP Verification</h2>

      <p class="text-gray-400 text-center text-sm sm:text-base mb-6">
        OTP sent to
        <span class="text-cyan-400 font-semibold break-all">{{ email }}</span>
      </p>

      <form method="POST" class="space-y-6">
        {% csrf_token %}

        <label class="block text-gray-200 font-semibold text-center text-sm sm:text-base">Enter 6 Digit OTP</label>

        <!-- OTP INPUTS -->

        <div class="flex justify-center gap-2 sm:gap-3">
          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-box w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 text-center text-lg sm:text-xl rounded-xl bg-gray-700 text-white focus:ring-2 focus:ring-blue-400 outline-none" />

          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-box w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 text-center text-lg sm:text-xl rounded-xl bg-gray-700 text-white focus:ring-2 focus:ring-blue-400 outline-none" />

          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-box w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 text-center text-lg sm:text-xl rounded-xl bg-gray-700 text-white focus:ring-2 focus:ring-blue-400 outline-none" />

          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-box w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 text-center text-lg sm:text-xl rounded-xl bg-gray-700 text-white focus:ring-2 focus:ring-blue-400 outline-none" />

          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-box w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 text-center text-lg sm:text-xl rounded-xl bg-gray-700 text-white focus:ring-2 focus:ring-blue-400 outline-none" />

          <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]*" class="otp-box w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 text-center text-lg sm:text-xl rounded-xl bg-gray-700 text-white focus:ring-2 focus:ring-blue-400 outline-none" />
        </div>

        <!-- Hidden OTP field -->

        <input type="hidden" name="otp" id="otp_value" />

        <!-- Error or Success Messages -->
    {% if messages %}
      {% for message in messages %}
        <div class="{% if message.tags == 'success' %}     
            text-green-500 md:text-md text-[15px]
          {% else %}            
            text-red-500 md:text-md text-[15px]
          {% endif %} p-3 rounded-lg mb-4 text-xl text-center">{{ message }}</div>
      {% endfor %}
    {% endif %}

        <button type="submit" class="w-full bg-linear-to-r from-blue-500 to-cyan-500 text-white font-semibold py-2 sm:py-3 rounded-2xl shadow-lg hover:scale-105 transition duration-300">Verify OTP</button>
      </form>

      <!-- Resend OTP -->

      <div class="text-center mt-6">
        <p id="timer" class="text-gray-400 text-xs sm:text-sm">
          Resend OTP in <span id="countdown">30</span> sec
        </p>

        <a href="{% url 'resend_otp' %}" id="resendBtn" class="hidden text-blue-400 font-semibold hover:text-cyan-400 transition text-sm">Resend OTP</a>
      </div>
    </div>
  </section>

  <script>
    const inputs = document.querySelectorAll('.otp-box')
    const otpField = document.getElementById('otp_value')
    
    inputs.forEach(function (input, index) {
      input.addEventListener('input', function () {
        if (input.value.length === 1 && index < inputs.length - 1) inputs[index + 1].focus()
        updateOtp()
      })
    })
    
    inputs.forEach(function (input, index) {
      input.addEventListener('keydown', function (e) {
        if (input.value.length == 0 && e.key == 'Backspace' && index > 0) {
          inputs[index - 1].focus()
        }
        if (e.key == 'ArrowLeft' && index > 0) {
          e.preventDefault()
          inputs[index - 1].focus()
        }
        if (e.key == 'ArrowRight' && index < inputs.length - 1) {
          inputs[index + 1].focus()
        }
      })
    })
    
    function updateOtp() {
      let otp = ''
      inputs.forEach(function (input) {
        otp += input.value
      })
    
      otpField.value = otp
    }
    
    /* TIMER */
    
    const countdown = document.getElementById('countdown')
    const resendBtn = document.getElementById('resendBtn')
    const timerText = document.getElementById('timer')
    
    let time = 30
    function countDownTimer() {
      time--
      countdown.innerText = time
    
      if (time <= 0) {
        clearInterval(timeInterval)
        timerText.style.display = 'none'
        resendBtn.classList.remove('hidden')
      }
    }
    const timeInterval = setInterval(countDownTimer, 1000)

  </script>




{% endblock %}
